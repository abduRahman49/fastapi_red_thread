[tool.pytest.ini_options]
asyncio_mode = "auto" # Mode async automatique
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "-v", # Verbose
    "--tb=short", # Tracebacks courts
    "--cov=app", # Couvrir le dossier app/
    "--cov-report=term-missing",
    "--cov-fail-under=80", # Echec si < 80% de couverture
]

[tool.coverage.run]
source = ["app"]
omit = ["app/main.py", "app/test_decorator.py", "alembic/*"]
